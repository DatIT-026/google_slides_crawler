<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Google Slides Crawler</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg: #111113;
        --card: #1c1c1f;
        --border: #2c2c30;
        --accent: #7c6af7;
        --teal: #5eead4;
        --text: #e8e8ea;
        --muted: #636368;
        --red: #f87171;
        --green: #4ade80;
        --r: 10px;
      }
      body {
        width: 300px;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 13px;
      }

      /* header */
      header {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 14px 16px 12px;
        border-bottom: 1px solid var(--border);
      }
      .logo {
        width: 28px;
        height: 28px;
        flex-shrink: 0;
        background: linear-gradient(135deg, var(--accent), var(--teal));
        border-radius: 7px;
        display: grid;
        place-items: center;
        font-size: 14px;
      }
      .logo-text {
        font-size: 13px;
        font-weight: 600;
      }
      .logo-sub {
        font-size: 10px;
        color: var(--muted);
        margin-top: 1px;
      }
      .v-badge {
        margin-left: auto;
        font-size: 10px;
        color: var(--muted);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2px 8px;
      }

      /* main */
      main {
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* status row */
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r);
        min-height: 42px;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--muted);
        transition: background 0.25s;
      }
      .dot.green {
        background: var(--green);
        box-shadow: 0 0 6px var(--green);
      }
      .dot.accent {
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
        animation: pulse 1s ease-in-out infinite alternate;
      }
      .dot.red {
        background: var(--red);
      }
      @keyframes pulse {
        to {
          opacity: 0.4;
        }
      }
      .status-text {
        font-size: 12px;
        color: var(--muted);
        flex: 1;
        line-height: 1.4;
      }
      .status-text b {
        color: var(--text);
        font-weight: 500;
      }
      .count-badge {
        font-size: 11px;
        font-weight: 600;
        color: var(--accent);
        background: #1e1a3a;
        border: 1px solid #3d3570;
        border-radius: 20px;
        padding: 2px 9px;
        white-space: nowrap;
        display: none;
      }

      /* progress */
      .prog-wrap {
        height: 3px;
        background: #222226;
        border-radius: 3px;
        overflow: hidden;
        display: none;
      }
      .prog-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), var(--teal));
        border-radius: 3px;
        transition: width 0.4s ease;
      }
      .prog-info {
        display: none;
        justify-content: space-between;
        font-size: 10px;
        color: var(--muted);
      }

      /* toggles */
      .toggles {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r);
        overflow: hidden;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        padding: 9px 12px;
        gap: 10px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .toggle-row:hover {
        background: #222226;
      }
      .toggle-row span {
        flex: 1;
        font-size: 12px;
        color: var(--text);
      }
      .toggle-div {
        height: 1px;
        background: var(--border);
      }
      .sw {
        position: relative;
        width: 32px;
        height: 17px;
        flex-shrink: 0;
      }
      .sw input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }
      .sw-track {
        position: absolute;
        inset: 0;
        background: #2a2a30;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .sw-track::before {
        content: "";
        position: absolute;
        width: 11px;
        height: 11px;
        left: 3px;
        top: 3px;
        background: var(--muted);
        border-radius: 50%;
        transition: transform 0.2s, background 0.2s;
      }
      .sw input:checked ~ .sw-track {
        background: var(--accent);
      }
      .sw input:checked ~ .sw-track::before {
        transform: translateX(15px);
        background: #fff;
      }

      /* button */
      .btn {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: var(--r);
        background: var(--accent);
        color: #fff;
        font-family: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        transition: opacity 0.2s, transform 0.1s, background 0.2s;
      }
      .btn:hover:not(:disabled) {
        opacity: 0.88;
      }
      .btn:active:not(:disabled) {
        transform: scale(0.98);
      }
      .btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .btn.done {
        background: #166534;
      }

      /* warning */
      .wrong {
        display: none;
        background: #1f1510;
        border: 1px solid #3d2a10;
        border-radius: var(--r);
        padding: 10px 12px;
        font-size: 11px;
        color: #fbbf24;
        line-height: 1.7;
        gap: 8px;
        align-items: flex-start;
      }
      .wrong.show {
        display: flex;
      }
      code {
        background: #0e1f1d;
        color: var(--teal);
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 10px;
        font-family: monospace;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .spin {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        flex-shrink: 0;
      }

      footer {
        padding: 8px 16px 12px;
        display: flex;
        justify-content: space-between;
        border-top: 1px solid var(--border);
      }
      footer span {
        font-size: 10px;
        color: var(--muted);
      }
      footer a {
        font-size: 10px;
        color: var(--accent);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">🎞</div>
      <div>
        <div class="logo-text">Google Slides Crawler</div>
        <div class="logo-sub">Google Slides → PDF</div>
      </div>
      <span class="v-badge">v1.0</span>
    </header>
    <main>
      <div class="wrong" id="wrong">
        <span>⚠️</span>
        <div>
          Change URL ending to <code>/htmlpresent</code> then reopen this popup.
        </div>
      </div>
      <div class="status-row">
        <div class="dot" id="dot"></div>
        <div class="status-text" id="status-text">Scanning page…</div>
        <div class="count-badge" id="count-badge"></div>
      </div>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-bar" id="prog-bar"></div>
      </div>
      <div class="prog-info" id="prog-info">
        <span id="prog-step"></span><span id="prog-pct"></span>
      </div>
      <div class="toggles">
        <label class="toggle-row">
          <span>Include slide notes</span>
          <label class="sw"
            ><input type="checkbox" id="opt-notes" checked /><span
              class="sw-track"
            ></span
          ></label>
        </label>
        <div class="toggle-div"></div>
        <label class="toggle-row">
          <span>One slide per page</span>
          <label class="sw"
            ><input type="checkbox" id="opt-onepage" checked /><span
              class="sw-track"
            ></span
          ></label>
        </label>
      </div>
      <button class="btn" id="btn" disabled>
        <!-- <span id="btn-icon"></span> -->
        <span id="btn-label">Export PDF</span>
      </button>
    </main>
    <footer>
      <span>by FireHelper Team</span>
      <a
        href="https://github.com/DatIT-026/google_slides_crawler"
        target="_blank"
        >GitHub ↗</a
      >
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
